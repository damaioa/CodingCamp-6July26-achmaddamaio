<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger — Expense &amp; Budget Visualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="counter">

  <header class="counter__header">
    <button id="themeToggle" class="tear-btn" type="button" aria-label="Toggle dark mode">☾</button>
    <p class="eyebrow">Daily Ledger</p>
    <h1 class="wordmark">TOTAL SPENT</h1>
    <p class="balance" id="balanceDisplay">Rp0</p>
    <p class="balance-sub" id="entryCount">0 entries logged</p>
  </header>

  <div class="perforation" aria-hidden="true"></div>

  <section class="receipt-body">

    <form id="entryForm" class="ticket-form" novalidate>
      <p class="section-label">— New Entry —</p>

      <label class="field">
        <span>Item</span>
        <input type="text" id="itemName" name="itemName" placeholder="e.g. Iced coffee" autocomplete="off">
      </label>

      <label class="field">
        <span>Amount (Rp)</span>
        <input type="number" id="itemAmount" name="itemAmount" placeholder="0" min="0" step="1" inputmode="decimal">
      </label>

      <label class="field">
        <span>Category</span>
        <select id="itemCategory" name="itemCategory">
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Fun">Fun</option>
          <option value="__custom">+ New category…</option>
        </select>
      </label>

      <label class="field field--hidden" id="customCategoryField">
        <span>New category name</span>
        <input type="text" id="customCategoryInput" placeholder="e.g. Study" autocomplete="off">
      </label>

      <p class="error-msg" id="formError" role="alert"></p>

      <button type="submit" class="print-btn">Print Entry</button>
    </form>

    <div class="perforation perforation--thin" aria-hidden="true"></div>

    <div class="list-controls">
      <p class="section-label">— Transactions —</p>
      <select id="sortSelect" class="sort-select">
        <option value="date">Newest first</option>
        <option value="amount">By amount</option>
        <option value="category">By category</option>
      </select>
    </div>

    <ul id="transactionList" class="transaction-list" aria-live="polite"></ul>
    <p class="empty-state" id="emptyState">No entries yet. Your ledger is blank.</p>

    <div class="perforation perforation--thin" aria-hidden="true"></div>

    <p class="section-label">— Spending by Category —</p>
    <div class="chart-wrap">
      <canvas id="categoryChart" width="280" height="280" role="img" aria-label="Pie chart of spending by category"></canvas>
      <p class="empty-state" id="chartEmptyState">Nothing to chart yet.</p>
    </div>

    <div class="perforation perforation--thin" aria-hidden="true"></div>

    <p class="section-label">— This Month —</p>
    <div class="monthly-summary" id="monthlySummary">
      <p class="empty-state">No entries this month.</p>
    </div>

  </section>

  <footer class="counter__footer">
    <p class="serial">NO. <span id="serialNumber">000001</span></p>
    <p class="thanks">*** THANK YOU FOR TRACKING ***</p>
  </footer>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
